<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helenic Works | Equipo</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="../assets/img/logo.png">
            Helenic<span>Works</span>
        </div>
        <nav id="navegador">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="./contacto.html">Contacto</a></li>
                <li><a href="./equipo.html" class="active">Equipo</a></li>
                <li><a href="./faq.html">Dudas Frecuentes</a></li>
                <li><a href="./pedidos.html">Pedidos</a></li>
                <li><a href="./servicios.html">Servicios</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="team-section">
            <h1 class="section-title">Nuestros <span>Entrenadores</span></h1>
            <p class="section-subtitle">Profesionales de la salud listos para guiar tu entrenamiento.</p>
            <div class="grid-container" id="equipo-container">
                <p>Cargando equipo...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Gimnasio Helenic Works - Trabajo Práctico N°1 Programacion III - Grupo 15</p>
    </footer>

    <script>
        const API_URL = 'https://tp3-helenic-works.onrender.com';

        const cargarEquipo = async () => {
            try {
                const response = await fetch(`${API_URL}/equipo`);
                const equipo = await response.json();
                const container = document.getElementById('equipo-container');
                container.innerHTML = '';
                equipo.forEach(entrenador => {
                    container.innerHTML += `
                        <div class="card" style="text-align: center;">
                            <img src="../assets/img/${entrenador.imagen}" alt="${entrenador.nombre}">
                            <div class="card-content">
                                <h2 class="card-title">${entrenador.nombre}</h2>
                                <p class="card-desc"><b>${entrenador.rol}</b><br>${entrenador.descripcion}</p>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.log(error);
                document.getElementById('equipo-container').innerHTML = '<p>Error al cargar el equipo.</p>';
            }
        };

        cargarEquipo();
    </script>
</body>
</html>
