<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helenic Works | Servicios</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="../assets/img/logo.png">
            Helenic<span>Works</span>
        </div>
        <nav id="navegador">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="./contacto.html">Contacto</a></li>
                <li><a href="./equipo.html">Equipo</a></li>
                <li><a href="./faq.html">Dudas Frecuentes</a></li>
                <li><a href="./pedidos.html">Pedidos</a></li>
                <li><a href="./servicios.html" class="active">Servicios</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="services-section">
            <h1 class="section-title">Nuestras <span>Clases</span></h1>
            <p class="section-subtitle">Opciones ajustadas a tus metas de hipertrofia o resistencia.</p>
            <div class="grid-container" id="servicios-container">
                <p>Cargando servicios...</p>
            </div>
        </section>

        <div style="text-align: center; margin-top: 48px;">
            <a href="./pedidos.html" class="btn">Contratar Plan Ahora</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Gimnasio Helenic Works - Trabajo Práctico N°1 Programacion III - Grupo 15</p>
    </footer>

    <script>
        const API_URL = 'https://tp3-helenic-works.onrender.com';

        const cargarServicios = async () => {
            try {
                const response = await fetch(`${API_URL}/servicios`);
                const servicios = await response.json();
                const container = document.getElementById('servicios-container');
                container.innerHTML = '';
                servicios.forEach(servicio => {
                    container.innerHTML += `
                        <div class="card">
                            <img src="../assets/img/${servicio.imagen}" alt="${servicio.nombre}">
                            <div class="card-content">
                                <h2 class="card-title">${servicio.nombre}</h2>
                                <p class="card-desc">${servicio.descripcion}</p>
                                <p class="card-price">$${servicio.precio.toLocaleString()} / mes</p>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.log(error);
                document.getElementById('servicios-container').innerHTML = '<p>Error al cargar los servicios.</p>';
            }
        };

        cargarServicios();
    </script>
</body>
</html>
