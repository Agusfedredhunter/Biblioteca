<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helenic Works | Contacto</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="../assets/img/logo.png">
            Helenic<span>Works</span>
        </div>
        <nav id="navegador">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="./contacto.html" class="active">Contacto</a></li>
                <li><a href="./equipo.html">Equipo</a></li>
                <li><a href="./faq.html">Dudas Frecuentes</a></li>
                <li><a href="./pedidos.html">Pedidos</a></li>
                <li><a href="./servicios.html">Servicios</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h1 class="section-title">Contáctanos</h1>
            <p class="section-subtitle">Déjanos tu mensaje y te responderemos a la brevedad.</p>

            <div class="form-container">
                <form action="#" method="get">
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" name="apellido" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email de contacto</label>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="mensaje">Mensaje o Consulta</label>
                        <textarea id="mensaje" name="mensaje" class="form-control" required></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn">Enviar Mensaje</button>
                        <button type="reset" class="btn btn-secondary">Limpiar</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Gimnasio Helenic Works - Trabajo Práctico N°1 Programacion III - Grupo 15</p>
    </footer>
</body>
</html>
