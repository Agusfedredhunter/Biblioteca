<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helenic Works | Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="../assets/img/logo.png">
            Helenic<span>Works</span>
        </div>
        <nav id="navegador">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="./contacto.html">Contacto</a></li>
                <li><a href="./equipo.html">Equipo</a></li>
                <li><a href="./faq.html">Dudas Frecuentes</a></li>
                <li><a href="./pedidos.html">Pedidos</a></li>
                <li><a href="./servicios.html">Servicios</a></li>
                <li><a href="./login.html" class="active">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div style="max-width: 400px; margin: 80px auto; padding: 40px; background: #1a1a1a; border-radius: 12px;">
            <h2 style="text-align: center; margin-bottom: 24px;">Acceso <span style="color: var(--color-primary, #e63946);">Clientes</span></h2>

            <div id="error-msg" style="display:none; color: red; text-align: center; margin-bottom: 16px;"></div>

            <div style="display: flex; flex-direction: column; gap: 16px;">
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="tu@mail.com" style="width: 100%; padding: 10px; margin-top: 6px; border-radius: 6px; border: none;">
                </div>
                <div>
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" style="width: 100%; padding: 10px; margin-top: 6px; border-radius: 6px; border: none;">
                </div>
                <button id="btn-login" class="btn" style="margin-top: 8px;">Ingresar</button>
            </div>

            <p style="text-align: center; margin-top: 20px;">¿No sos miembro? <a href="./servicios.html">Ver planes</a></p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Gimnasio Helenic Works - Trabajo Práctico N°1 Programacion III - Grupo 15</p>
    </footer>

    <script>
        const API_URL = 'https://tp3-helenic-works.onrender.com';

        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('usuarioId', data.id);
                    window.location.href = './perfil.html';
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = data.error || 'Credenciales incorrectas';
                }
            } catch (error) {
                console.log(error);
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Error al conectar con el servidor';
            }
        });
    </script>
</body>
</html>
