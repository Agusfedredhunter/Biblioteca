<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido de Servicio - Helenic Works Gym</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header>
        <h1>Helenic Works Gym</h1>
        <p>Solicitá tu plan de entrenamiento</p>
    </header>

    <nav>
        <ul>
            <li><a href="../index.html">Inicio</a></li>
            <li><a href="servicios.html">Servicios</a></li>
            <li><a href="equipo.html">Equipo</a></li>
            <li><a href="pedido.html">Pedido</a></li>
            <li><a href="contacto.html">Contacto</a></li>
            <li><a href="faq.html">FAQ</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Formulario de Pedido</h2>
            <p>Completá tus datos para solicitar un servicio.</p>

            <form action="#" method="post">
                <div>
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <br>

                <div>
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" required>
                </div>

                <br>

                <div>
                    <label for="servicio">Seleccioná un servicio:</label>
                    <select id="servicio" name="servicio" required>
                        <option value="">Elegí una opción</option>
                        <option value="musculacion">Musculación</option>
                        <option value="funcional">Entrenamiento Funcional</option>
                        <option value="yoga">Yoga</option>
                    </select>
                </div>

                <br>

                <div>
                    <p>Objetivo principal:</p>

                    <input type="radio" id="bajar_peso" name="objetivo" value="bajar_peso">
                    <label for="bajar_peso">Bajar de peso</label>

                    <input type="radio" id="ganar_masa" name="objetivo" value="ganar_masa">
                    <label for="ganar_masa">Ganar masa muscular</label>

                    <input type="radio" id="mantenerse" name="objetivo" value="mantenerse">
                    <label for="mantenerse">Mantenerse activo</label>
                </div>

                <br>

                <div>
                    <p>Días disponibles:</p>

                    <input type="checkbox" id="lunes" name="dias" value="lunes">
                    <label for="lunes">Lunes</label>

                    <input type="checkbox" id="miercoles" name="dias" value="miercoles">
                    <label for="miercoles">Miércoles</label>

                    <input type="checkbox" id="viernes" name="dias" value="viernes">
                    <label for="viernes">Viernes</label>
                </div>

                <br>

                <div>
                    <label for="fecha">Fecha de inicio:</label>
                    <input type="date" id="fecha" name="fecha">
                </div>

                <br>

                <div>
                    <label for="comentarios">Comentarios:</label><br>
                    <textarea id="comentarios" name="comentarios" rows="5" cols="40" placeholder="Escribí acá tus objetivos o dudas"></textarea>
                </div>

                <br>

                <div>
                    <input type="submit" value="Enviar pedido">
                    <input type="reset" value="Restablecer">
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Helenic Works Gym - Todos los derechos reservados</p>
    </footer>

</body>
</html>
